<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%" class="luna-logo-svg">
  <defs>
    <style>
      .logo-text-luna {
        font-family: 'Cinzel', 'Playfair Display', 'Didot', 'Georgia', serif;
        font-size: 26px;
        font-weight: 400;
        letter-spacing: 0.22em;
        text-anchor: middle;
        fill: currentColor;
      }
      .logo-text-sub {
        font-family: 'Geist', 'Inter', 'Roboto', 'Helvetica Neue', sans-serif;
        font-size: 8.5px;
        font-weight: 500;
        letter-spacing: 0.24em;
        text-anchor: middle;
        fill: currentColor;
      }
      .logo-graphic {
        fill: currentColor;
      }
      .logo-outline {
        stroke: currentColor;
        stroke-width: 1.2px;
        fill: none;
        opacity: 0.85;
      }
    </style>
  </defs>

  <!-- Outer Elegant Ring -->
  <circle cx="100" cy="100" r="92" class="logo-outline" />

  <!-- Moon Silhouette Group -->
  <g class="logo-graphic" transform="translate(3, -5)">
    <!-- Crescent Moon with Face Silhouette -->
    <path d="M 92,30 
             A 45,45 0 0,0 92,120 
             C 100,120 106,115 106,108 
             C 106,104 96,102 96,98 
             C 96,96 94,95 97,93 
             C 100,91 99,89 97,87 
             C 94,86 93,85 91,83 
             C 88,81 86,79 97,76 
             C 94,71 91,58 106,46 
             C 112,41 106,32 92,30 Z" />

    <!-- Stylized Butterfly next to face profile -->
    <g transform="translate(120, 52) scale(0.85) rotate(-12)">
      <!-- Right Wing -->
      <path d="M 2,-2 C 6,-12 18,-10 14,-2 C 12,2 4,1 2,2 C 6,6 12,10 9,14 C 6,18 0,10 2,-2 Z" />
      <!-- Left Wing -->
      <path d="M -1,-2 C -4,-10 -12,-8 -9,-2 C -8,1 -3,1 -1,2 C -4,5 -8,8 -6,11 C -4,14 0,8 -1,-2 Z" />
      <!-- Antennae -->
      <path d="M 0,-4 C 1,-9 6,-11 9,-10 M 0,-4 C -1,-9 -4,-11 -6,-10" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" />
    </g>
  </g>

  <!-- Brand Typography -->
  <!-- Shifted slightly down for optimal layout spacing -->
  <text x="104" y="152" class="logo-text-luna">LUNA</text>
  <text x="102" y="172" class="logo-text-sub">SKIN AESTHETICS</text>
</svg>
